# Public-demo destination override — deploy with:  kamal deploy -d demo
#
# Infra-specific values (domain, server IP, DB password) live in a gitignored
# `.env` at the repo root — nothing private is committed. The ERB below loads
# that file, so `kamal deploy -d demo` just works with no manual exports (an
# explicit `export` still wins, since Dotenv.load never overrides a set var).
# Copy `.env.example` to `.env` and fill it in. ENV.fetch raises at deploy time
# if a value is missing, so you can't ship a placeholder.
<% require "dotenv"; Dotenv.load(".env") %>

servers:
  web:
    - <%= ENV.fetch("DEMO_SERVER_IP") { raise "Set DEMO_SERVER_IP before deploying the demo" } %>

# Connect with the ed25519 deploy key only. This sidesteps net-ssh signing the
# default ECDSA key with Ruby's OpenSSL 3 (which fails: "EVP_PKEY_sign … ECDSA
# sign"), and needs no ssh-agent — ed25519 signs via the pure-Ruby ed25519 gem.
# keys_only stops net-ssh from trying any other identity.
ssh:
  keys: [ "<%= File.expand_path('~/.ssh/kamal_deploy') %>" ]
  keys_only: true

# TLS via the Kamal proxy (Let's Encrypt). Requires config.force_ssl (already on
# in production.rb).
proxy:
  ssl: true
  host: <%= ENV.fetch("DEMO_DOMAIN") { raise "Set DEMO_DOMAIN before deploying the demo" } %>

env:
  clear:
    SOLID_QUEUE_IN_PUMA: true      # jobs (incl. the nightly reset) run inside Puma
    DEMO_MODE: true                # persona-picker sign-in + nightly data reset
    COMPLIVENTORY_HOST: https://<%= ENV.fetch("DEMO_DOMAIN") %>
    # Point the app at the Postgres accessory below (Kamal wires it on the
    # private Docker network under the accessory's name: <service>-db).
    COMPLIVENTORY_DATABASE_HOST: compliventory-db
    COMPLIVENTORY_DATABASE_USER: compliventory
    # OIDC/SMTP are intentionally unset: the demo signs in via personas and
    # drops outgoing mail (nothing is actually delivered).
  secret:
    - RAILS_MASTER_KEY
    - COMPLIVENTORY_DATABASE_PASSWORD

# Postgres on the same server, private to the app. `db:prepare` (run by the
# image entrypoint on boot) creates the primary + Solid cache/queue/cable
# databases, since the accessory user is a superuser.
accessories:
  db:
    image: postgres:16
    host: <%= ENV.fetch("DEMO_SERVER_IP") %>
    port: "127.0.0.1:5432:5432"    # bound to localhost only — not exposed publicly
    env:
      clear:
        POSTGRES_USER: compliventory
        POSTGRES_DB: compliventory_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
