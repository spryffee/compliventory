<!-- Brand favicon (the compliventory shelf-slab mark). relative_url keeps the
     paths correct under the GitHub Pages baseurl (/compliventory). -->
<link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
<link rel="icon" href="{{ '/favicon-32.png' | relative_url }}" type="image/png" sizes="32x32">
<link rel="icon" href="{{ '/favicon-16.png' | relative_url }}" type="image/png" sizes="16x16">
<link rel="apple-touch-icon" href="{{ '/apple-touch-icon.png' | relative_url }}">

<!-- Brand fonts: Inter + JetBrains Mono (same as the application UI). -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
