title: compliventory
description: >-
  The company's vendors and systems, accounted for. Documentation: concepts and
  change control, the users sync API contract, and the deployment guide.

# No hardcoded site URL or custom domain here. Asset/link paths are relative;
# `baseurl` is injected at build time from the GitHub Pages config (empty for a
# custom domain, "/<repo>" for project pages) — see .github/workflows/pages.yml.
# A custom domain, if any, is set in the repo's Pages settings, not in source.
baseurl: ""

theme: just-the-docs
color_scheme: compliventory

# Mermaid diagrams in ```mermaid fenced blocks (loaded from CDN by Just the Docs).
mermaid:
  version: "10.9.3"

# Every page uses the themed layout by default; index.md overrides with `home`.
# Without this, pages that omit `layout:` render as bare, unstyled HTML.
defaults:
  - scope:
      path: ""
    values:
      layout: default

plugins:
  - jekyll-relative-links

# jekyll-relative-links: convert .md cross-links to .html, keep them relative.
relative_links:
  enabled: true
  collections: false

# Full-text search (Just the Docs lunr index).
search_enabled: true
search:
  heading_level: 3

# Repo / edit links in the page chrome.
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/spryffee/compliventory"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

aux_links:
  "GitHub":
    - "https://github.com/spryffee/compliventory"
aux_links_new_tab: true

# Footer.
last_edit_timestamp: true
last_edit_time_format: "%Y-%m-%d"

# Exclude the toolchain itself from the build output.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
